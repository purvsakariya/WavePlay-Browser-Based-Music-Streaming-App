<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify – Music Player</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <!-- ══════════════════════════════════
       MOBILE TOP BAR (hidden on desktop)
  ═══════════════════════════════════ -->
    <div class="mobile-topbar">
      <div class="mobile-logo">
        <div class="mobile-logo-icon">
          <svg viewBox="0 0 24 24" fill="white">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.65 14.65c-.2.2-.51.27-.78.17-2.13-.99-4.81-1.21-7.97-.66-.31.06-.6-.13-.66-.44-.06-.31.13-.6.44-.66 3.46-.61 6.43-.35 8.81.76.27.13.41.47.27.78-.05.02-.08.04-.11.05zm1.24-2.76c-.25.26-.65.33-.97.14-2.44-1.14-6.16-1.47-9.05-.8-.37.09-.75-.14-.84-.51-.09-.37.14-.75.51-.84 3.3-.75 7.4-.38 10.22.93.32.15.47.55.31.87-.05.07-.12.14-.18.21zm.1-2.88c-2.93-1.32-7.77-1.44-10.57-.8-.44.1-.88-.17-.98-.61-.1-.44.17-.88.61-.98 3.22-.73 8.58-.59 11.97.93.41.19.59.67.41 1.08-.19.41-.67.59-1.08.41-.12-.01-.24-.02-.36-.03z" />
          </svg>
        </div>
        <span class="mobile-logo-text">Spotify</span>
      </div>

      <!-- Hamburger / menu SVG icon -->
      <button class="hamburger-btn" id="hamburgerBtn" title="Open menu" aria-label="Open sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <button class="sidebar-close-btn remove" title="Open menu" aria-label="Open sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>


    <!-- MAIN LAYOUT -->
    <div class="main-layout">
      <aside class="sidebar" id="sidebar">
        <!-- Desktop logo row -->
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="white">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.65 14.65c-.2.2-.51.27-.78.17-2.13-.99-4.81-1.21-7.97-.66-.31.06-.6-.13-.66-.44-.06-.31.13-.6.44-.66 3.46-.61 6.43-.35 8.81.76.27.13.41.47.27.78-.05.02-.08.04-.11.05zm1.24-2.76c-.25.26-.65.33-.97.14-2.44-1.14-6.16-1.47-9.05-.8-.37.09-.75-.14-.84-.51-.09-.37.14-.75.51-.84 3.3-.75 7.4-.38 10.22.93.32.15.47.55.31.87-.05.07-.12.14-.18.21zm.1-2.88c-2.93-1.32-7.77-1.44-10.57-.8-.44.1-.88-.17-.98-.61-.1-.44.17-.88.61-.98 3.22-.73 8.58-.59 11.97.93.41.19.59.67.41 1.08-.19.41-.67.59-1.08.41-.12-.01-.24-.02-.36-.03z" />
            </svg>
          </div>
          <span class="logo-text">Spotify</span>
        </div>

        <!-- Home in sidebar-->
        <nav class="nav-items">
          <div class="nav-item active">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            Home
          </div>
        </nav>

        <div class="sidebar-divider"></div>
        <div class="sidebar-section-title">Your Library</div>

        <!-- Library track list -->
        <ul class="library-list"></ul>
      </aside>

      <!-- ════════════════════════════
         MAIN CONTENT
    ════════════════════════════ -->
      <main class="content">
        <div class="breadcrumb">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
          </svg>
          <span>Spavice</span>
        </div>

        <h1 class="section-title">Spotify Playlists</h1>

        <!-- Row 1 -->
        <div class="playlist-grid">

          <div class="playlist-card">
            <div class="card-image-placeholder c3">
              <div class="card-label" style="letter-spacing:.15em;font-size:.75rem;color:rgba(200,180,255,.8);">
                БЬРFGAIEA</div>
            </div>
            <div class="card-body">
              <div class="card-name">Just Chill</div>
              <div class="card-desc">Yes, Just Chill</div>
              <div class="play-overlay"><svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z" />
                </svg></div>
            </div>
          </div>

          <div class="playlist-card">
            <div class="card-image-placeholder c5">
              <div style="font-size:1.8rem;font-weight:900;color:rgba(255,255,255,.15);">🐴</div>
            </div>
            <div class="card-body">
              <div class="card-name">Dark Horse</div>
              <div class="card-desc">Dark Songs for you</div>
              <div class="play-overlay"><svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z" />
                </svg></div>
            </div>
          </div>

          <div class="playlist-card">
            <div class="card-image-placeholder c8" style="flex-direction:column;gap:2px;">
              <div style="font-size:1.6rem;">🎤</div>
              <div style="font-size:.65rem;color:rgba(255,255,255,.5);font-style:italic;">Karan Aujla</div>
            </div>
            <div class="card-body">
              <div class="card-name">Karan Aujla</div>
              <div class="card-desc">Karan Aujla for you</div>
              <div class="play-overlay"><svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z" />
                </svg></div>
            </div>
          </div>

        </div>
      </main>
    </div><!-- /.main-layout -->

    <!-- ══════════════════════════════════
       PLAYER BAR
  ═══════════════════════════════════ -->
    <div class="player">

      <div class="now-playing">
        <div class="now-playing-thumb">🎵</div>
        <div class="now-playing-info">
          <div class="now-playing-title">BHAV_NA_BHERU<span>- Copy</span></div>
          <div class="now-playing-artist">Purv</div>
        </div>
      </div>

      <div class="player-controls">
        <div class="control-buttons">
          <!-- skip-first / skip-last hidden on small screens via CSS -->
          <button id="previous" class="ctrl-btn" title="Previous">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
              fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
              <path
                d="M8.06492 12.6258C8.31931 13.8374 9.67295 14.7077 12.3802 16.4481C15.3247 18.3411 16.797 19.2876 17.9895 18.9229C18.3934 18.7994 18.7654 18.5823 19.0777 18.2876C20 17.4178 20 15.6118 20 12C20 8.38816 20 6.58224 19.0777 5.71235C18.7654 5.41773 18.3934 5.20057 17.9895 5.07707C16.797 4.71243 15.3247 5.6589 12.3802 7.55186C9.67295 9.29233 8.31931 10.1626 8.06492 11.3742C7.97836 11.7865 7.97836 12.2135 8.06492 12.6258Z" />
              <path d="M4 4L4 20" />
            </svg>
          </button>
          <button id="previous10s" class="ctrl-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M6 13c0 3.31 2.69 6 6 6s6-2.69 6-6-2.69-6-6-6v4l-5-5 5-5v4c4.42 0 8 3.58 8 8s-3.58 8-8 8-8-3.58-8-8h2z" />
              <text x="9.5" y="16" font-size="5.5" font-family="sans-serif" font-weight="bold">10</text>
            </svg>
          </button>
          <button class="ctrl-btn play-btn playing">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg class="remove" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="5" width="4" height="14" rx="1" />
              <rect x="14" y="5" width="4" height="14" rx="1" />
            </svg>
          </button>
          <button id="next10s" class="ctrl-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M18 13c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v4l5-5-5-5v4c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2z" />
              <text x="9.5" y="16" font-size="5.5" font-family="sans-serif" font-weight="bold">10</text>
            </svg>
          </button>
          <button id="next" class="ctrl-btn" title="Next">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
              fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
              <path
                d="M15.9351 12.6258C15.6807 13.8374 14.327 14.7077 11.6198 16.4481C8.67528 18.3411 7.20303 19.2876 6.01052 18.9229C5.60662 18.7994 5.23463 18.5823 4.92227 18.2876C4 17.4178 4 15.6118 4 12C4 8.38816 4 6.58224 4.92227 5.71235C5.23463 5.41773 5.60662 5.20057 6.01052 5.07707C7.20304 4.71243 8.67528 5.6589 11.6198 7.55186C14.327 9.29233 15.6807 10.1626 15.9351 11.3742C16.0216 11.7865 16.0216 12.2135 15.9351 12.6258Z" />
              <path d="M20 5V19" />
            </svg>
          </button>
        </div>
        <div class="progress-bar">
          <span id="currentTime" class="time-label">00:00</span>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span id="totalTime" class="time-label right">00:00</span>
        </div>
      </div>

      <div class="player-right">
        <div class="player-right-first" style="display:flex;align-items:center;gap:6px;">
          <div class="equalizer">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
          </div>
        </div>

        <button class="dot-btn" title="More options">
          <span></span><span></span><span></span>
        </button>

        <div class="vol-bar">
          <button class="ctrl-btn" style="padding:2px;" title="Volume">
            <svg id="mediumvolume" class="remove" viewBox="0 0 24 24" fill="currentColor"
              style="width:16px;height:16px;">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
            </svg>
            <svg id="fullvolume" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
            </svg>
            <svg id="mutevolume" class="remove" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
            </svg>
          </button>
          <input class="vol-track" type="range" name="volume" id="volume">
        </div>
      </div>

    </div><!-- /.player -->

  </div><!-- /.app -->

  <!-- External JavaScript -->
  <script src="script.js"></script>

</body>

</html>
